<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MBTI Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #161616; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── top bar ── */
#topbar { background: #1f1f1f; border-bottom: 1px solid #2e2e2e; padding: 12px 18px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }

.persona-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.persona-col { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
.persona-col label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .5px; }
.persona-col select { background: #2a2a2a; color: #e0e0e0; border: 1px solid #3a3a3a; border-radius: 7px; padding: 7px 10px; font-size: 13px; cursor: pointer; width: 100%; }
.vs { font-size: 18px; color: #444; align-self: flex-end; padding-bottom: 6px; }

.btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
button { border: none; border-radius: 7px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
#btn-start  { background: #3a7bd5; color: #fff; }
#btn-start:hover { background: #4a8be5; }
#btn-new    { background: #2e2e2e; color: #aaa; }
#btn-new:hover { background: #3a3a3a; }
#btn-stop   { background: #c0392b; color: #fff; display: none; }
#btn-stop:hover { background: #e74c3c; }

/* ── scenario banner ── */
#scenario-banner { background: #1a2a1a; border: 1px solid #2d4a2d; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #7ec87e; display: none; }
#scenario-banner span { color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-right: 6px; }

#log-label { color: #444; font-size: 11px; margin-left: auto; }

/* ── chat area ── */
#chat { flex: 1; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 10px; }

.bubble-wrap { display: flex; flex-direction: column; max-width: 68%; }
.bubble-wrap.left  { align-self: flex-start; align-items: flex-start; }
.bubble-wrap.right { align-self: flex-end;   align-items: flex-end; }
.bubble-wrap.center { align-self: center; align-items: center; }

.blabel { font-size: 11px; color: #555; margin-bottom: 3px; padding: 0 4px; }
.bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55; word-break: break-word; }
.bubble.p1    { background: #1e3a5f; color: #cce0ff; border-bottom-left-radius: 4px; }
.bubble.p2    { background: #2d2d2d; color: #e0e0e0; border-bottom-right-radius: 4px; }
.bubble.human { background: #2d4a2d; color: #c8f0c8; border-bottom-right-radius: 4px; }
.system-msg { color: #444; font-size: 12px; font-style: italic; text-align: center; }
.typing-msg { color: #555; font-size: 13px; font-style: italic; }

/* ── input bar ── */
#inputbar { background: #1f1f1f; border-top: 1px solid #2e2e2e; padding: 12px 16px; display: none; gap: 10px; align-items: center; }
#msg { flex: 1; background: #2a2a2a; color: #e0e0e0; border: 1px solid #3a3a3a; border-radius: 20px; padding: 10px 16px; font-size: 14px; outline: none; }
#msg:focus { border-color: #3a7bd5; }
#btn-send { background: #3a7bd5; color: #fff; border-radius: 20px; padding: 10px 20px; font-size: 14px; }
#btn-send:hover { background: #4a8be5; }
#btn-send:disabled, #msg:disabled { opacity: 0.35; cursor: default; }
</style>
</head>
<body>

<div id="topbar">
  <div class="persona-row">
    <div class="persona-col">
      <label>Persona 1</label>
      <select id="sel1"></select>
    </div>
    <div class="vs">↔</div>
    <div class="persona-col">
      <label>Persona 2</label>
      <select id="sel2"></select>
    </div>
  </div>

  <div id="scenario-banner"><span>scenario</span><span id="scenario-text"></span></div>

  <div class="btn-row">
    <button id="btn-start" onclick="startChat()">Start</button>
    <button id="btn-new"   onclick="newChat()" style="display:none">New Chat</button>
    <button id="btn-stop"  onclick="stopChat()">Stop</button>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#666;cursor:pointer;margin-left:8px;">
      <input type="checkbox" id="chk-delay" checked> delay
    </label>
    <span id="log-label"></span>
  </div>
</div>

<div id="chat"></div>

<div id="inputbar">
  <input id="msg" type="text" placeholder="type your message…" disabled
         onkeydown="if(event.key==='Enter') sendMsg()">
  <button id="btn-send" onclick="sendMsg()" disabled>Send</button>
</div>

<script>
let mode = "";
let p1name = "", p2name = "";
let running = false;
const AUTO_DELAY = 2200;

async function loadPersonas() {
  const res = await fetch("/personas");
  const data = await res.json();
  [document.getElementById("sel1"), document.getElementById("sel2")].forEach((sel, i) => {
    data.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.key;
      opt.textContent = p.key + (p.key === "Human" ? " — you type" : " — " + p.desc);
      sel.appendChild(opt);
    });
    sel.value = i === 0 ? "ENFP" : "INTJ";
  });
}

async function startChat() {
  const persona1 = document.getElementById("sel1").value;
  const persona2 = document.getElementById("sel2").value;
  running = false;
  clearChat();

  const res = await fetch("/start", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({persona1, persona2})
  });
  const data = await res.json();
  mode = data.mode;
  p1name = data.persona1;
  p2name = data.persona2;

  document.getElementById("scenario-text").textContent = data.scenario;
  document.getElementById("scenario-banner").style.display = "block";
  document.getElementById("log-label").textContent = "saved → chats/" + data.log;
  document.getElementById("btn-new").style.display = "inline-block";

  if (data.opening) {
    const side = data.opening_speaker === "1" ? "left" : "right";
    const pname = data.opening_speaker === "1" ? p1name : p2name;
    const cls   = data.opening_speaker === "1" ? "p1" : "p2";
    addBubble(side, pname, data.opening, cls);
  }

  if (mode === "auto") {
    document.getElementById("btn-stop").style.display = "inline-block";
    document.getElementById("inputbar").style.display = "none";
    running = true;
    setTimeout(autoLoop, AUTO_DELAY);
  } else if (mode === "human1" || mode === "human2") {
    document.getElementById("btn-stop").style.display = "none";
    document.getElementById("inputbar").style.display = "flex";
    setInputEnabled(true);
  } else {
    document.getElementById("inputbar").style.display = "none";
  }
}

async function autoLoop() {
  if (!running) return;
  const typing = addTyping();
  try {
    const res = await fetch("/auto_turn", {method: "POST"});
    const data = await res.json();
    typing.remove();
    if (data.done && !data.reply) {
      running = false;
      addSystem("— " + data.reason + " —");
      document.getElementById("btn-stop").style.display = "none";
      return;
    }
    const side = data.speaker === "1" ? "left" : "right";
    const cls  = data.speaker === "1" ? "p1" : "p2";
    addBubble(side, data.persona, data.reply, cls);
    if (data.done) {
      running = false;
      addSystem("— reached 50 message limit —");
      document.getElementById("btn-stop").style.display = "none";
      return;
    }
  } catch(e) {
    typing.remove();
    running = false;
    return;
  }
  if (running) setTimeout(autoLoop, document.getElementById("chk-delay").checked ? AUTO_DELAY : 0);
}

async function sendMsg() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  const humanSide = mode === "human1" ? "left" : "right";
  addBubble(humanSide, "You", text, "human");
  setInputEnabled(false);

  const typing = addTyping();
  const res = await fetch("/send", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text})
  });
  const data = await res.json();
  typing.remove();
  if (data.error === "limit") {
    addSystem("— " + data.reason + " —");
    setInputEnabled(false);
    return;
  }
  const aiSide = data.speaker === "1" ? "left" : "right";
  const cls    = data.speaker === "1" ? "p1" : "p2";
  addBubble(aiSide, data.persona, data.reply, cls);
  if (data.done) {
    addSystem("— reached 50 message limit —");
    setInputEnabled(false);
    return;
  }
  setInputEnabled(true);
  document.getElementById("msg").focus();
}

async function stopChat() {
  running = false;
  await fetch("/stop", {method: "POST"});
  document.getElementById("btn-stop").style.display = "none";
  addSystem("— chat stopped —");
}

function newChat() {
  running = false;
  clearChat();
  document.getElementById("scenario-banner").style.display = "none";
  document.getElementById("btn-stop").style.display = "none";
  document.getElementById("btn-new").style.display = "none";
  document.getElementById("inputbar").style.display = "none";
  document.getElementById("log-label").textContent = "";
}

function addBubble(side, name, text, cls) {
  const chat = document.getElementById("chat");
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap " + side;
  const label = document.createElement("div");
  label.className = "blabel";
  label.textContent = name;
  const bubble = document.createElement("div");
  bubble.className = "bubble " + cls;
  bubble.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addSystem(text) {
  const chat = document.getElementById("chat");
  const el = document.createElement("div");
  el.className = "bubble-wrap center";
  const inner = document.createElement("div");
  inner.className = "system-msg";
  inner.textContent = text;
  el.appendChild(inner);
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const chat = document.getElementById("chat");
  const el = document.createElement("div");
  el.className = "bubble-wrap left";
  const inner = document.createElement("div");
  inner.className = "typing-msg";
  inner.textContent = "…";
  el.appendChild(inner);
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function clearChat() { document.getElementById("chat").innerHTML = ""; }
function setInputEnabled(on) {
  document.getElementById("msg").disabled = !on;
  document.getElementById("btn-send").disabled = !on;
}

loadPersonas();
</script>
</body>
</html>
